<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Acceso - MyActions</title>
    <link rel="stylesheet" href="/dashboard/styles.css" />
  </head>
  <body class="login-body">
    <main class="login-shell">
      <form class="login-panel" method="post" action="/login" novalidate>
        <div class="login-brand">
          <span>MyActions</span>
          <strong>Decision Engine</strong>
        </div>
        <h1>Acceso privado</h1>
        <p>Entra para revisar tu tablero ORB, riesgo y tickets XTB.</p>
        <div class="login-error" id="login-error" hidden>
          Usuario o clave incorrectos. Revisa espacios, simbolos y vuelve a intentar.
        </div>
        <label class="login-field">
          Usuario
          <input name="username" autocomplete="username" autocapitalize="none" spellcheck="false" minlength="3" maxlength="64" required />
          <span>El usuario no distingue mayusculas.</span>
        </label>
        <label class="login-field">
          Clave
          <input name="password" type="password" autocomplete="current-password" minlength="8" maxlength="128" required />
          <span>La clave si distingue mayusculas, minusculas y simbolos.</span>
        </label>
        <p class="login-hint">Proteccion activa: cookies HttpOnly, entrada sanitizada y redireccion interna segura.</p>
        <input name="next" type="hidden" value="/dashboard/" />
        <button type="submit">Entrar</button>
      </form>
    </main>
    <script>
      const params = new URLSearchParams(window.location.search);
      if (params.get("error") === "1") {
        document.getElementById("login-error").hidden = false;
      }
      document.querySelector(".login-panel").addEventListener("submit", (event) => {
        const form = event.currentTarget;
        const username = form.username.value.trim();
        const password = form.password.value.trim();
        if (!username || !password || username.length > 64 || password.length > 128) {
          event.preventDefault();
          document.getElementById("login-error").hidden = false;
        }
        form.username.value = username;
        form.password.value = password;
      });
    </script>
  </body>
</html>
